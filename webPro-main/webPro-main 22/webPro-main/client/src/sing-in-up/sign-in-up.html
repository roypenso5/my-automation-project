<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-in-up-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Modern login page </title>
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
            <form name="details" onsubmit="singUp(event)">
                <h1>Create Account</h1>
                <div class="social-icons">
                <a href="#" class="icon">
                    <i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-github"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <div>
                    <span>or use your email
                        for registration</span>
                        <input type="text" placeholder="Name" name="userName">
                        <input type="email" placeholder="Email" name="userEmail">
                        <input type="password" placeholder="password" name="userPassword">
                        <button type="submit">Sign Up</button>
                </div>
            </form>
        </div>
        <div class="form-container sign-in">
            <form id="loginForm" onsubmit="signIn(event)">
                <h1>Sign In</h1>
                <div class="social-icons">
                <a href="#" class="icon">
                    <i class="fa-brands fa-google-plus-g"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-github"></i></a>
                <a href="#" class="icon">
                    <i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <div>
                    <span>or use your email
                        password</span>
                        <input type="email" placeholder="Email" name="userEmail">
                        <input type="password" placeholder="password" name="userPassword">
                        <a href="#">Forget your Password?</a> 
                        <button type="submit">Sign In</button>
                </div>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details 
                        to use all of site features</p>
                        <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with personal details 
                        to use all of site features</p>
                        <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>


    <script src="sign-in-up-script.js"></script>
</body>
</html>
